sources_list:
  VIOBOT:
    # sources_id 表示该定位源的id序号，在launch中指定定位源通过指定sources_id的方式来进行实现
    source_id: 0
    # 表示该定位源的职责或者说定位能力
    capabilities:
      # 表示当前定位源是否提供local系下的里程计，如果提供则订阅对应的topic
      provides_local: true
      # 表示当前定位源是否提供global系下的里程计，如果提供则订阅对应的topic
      provides_global: false  
      # 表示当前定位源是否支持重定位，如果支持则订阅对应的topic
      supported_relocalization: [disable]
      # publish_mode 表示我们将如何对待订阅话题得到的的数据，当设置为DIRECT_COPY表示我们将把话题在两者之间进行复制
      # 也就是说，当设置为 SINGLE_COPY时，我们会输出 测量值=local_odom=global_odom
      publish_mode: SINGLE_COPY
    source_topics:
      # 此处话题和上方对应，provides_local_measurement:true则对应订阅local_topic话题
      local_topic: /sunray/localization/local_odom
      global_topic: ""
      relocalization_topic: ""

# mocap提供global系下的定位，测量值=local_odom=global_odom
  MOCAP:
    source_id: 1
    capabilities:
      # 由于动捕是一种基于外部观测方法得到的里程计，因此其实际上不提供local系下的里程计
      provides_local: false
      # 动捕提供global系下的里程计
      provides_global: true  
      # 单动捕不支持使用重定位检测
      supported_relocalization: [disable]
      # 测量值=local_odom=global_odom
      publish_mode: SINGLE_COPY
    source_topics:
      local_topic: ""
      global_topic: /uav1/sunray/odometry
      relocalization_topic: ""

# vins-fusion 提供local系下的定位，测量值=local_odom=global_odom
  VINS:
    source_id: 2
    capabilities:
      # vins 依赖机体双目相机和飞控的IMU数据，因此提供的是local系下的位置估计
      provides_local: true
      # vins 在开启回环的时候会构建全局地图，但本身并不输出global系下的位置估计
      provides_global: false  
      # 单vins不支持使用重定位检测
      supported_relocalization: [disable]
      # 测量值=local_odom=global_odom
      publish_mode: SINGLE_COPY
    source_topics:
      local_topic: "/vins_estimator/imu_propagate"
      global_topic: ""
      relocalization_topic: ""

# gazebo 仿真器下的绝对真值，提供global系下的定位，测量值=local_odom=global_odom
  GAZEBO:
    source_id: 3
    capabilities:
      # gazebo 基于渲染器提供真值估计，因此不提供local而是提供global
      provides_local: false
      # gazebo提供global系下的定位
      provides_global: true  
      # 单gazebo不支持使用重定位检测
      supported_relocalization: [disable]
      # 测量值=local_odom=global_odom
      publish_mode: SINGLE_COPY
    source_topics:
      local_topic: ""
      global_topic: "/uav1/sunray/gazebo_pose" 
      relocalization_topic: ""








