# Sunray_Control_Arbiter 参数配置
# 说明：键名需与 sunray_control_arbiter.cpp 的 nh.param("arbiter/...") 保持一致。

arbiter:
  # 候选控制输出有效时间窗口（秒）
  output_timeout_s: 0.2

  # 允许的最大发布间隔（秒），超出后会告警
  publish_timeout_s: 0.2

  # 速度限幅（m/s）
  max_velocity_xy_mps: 3.0
  max_velocity_z_mps: 1.5

  # 推力限幅
  min_thrust: 0.0
  max_thrust: 1.0

  # true: 优先发布到 /mavros/setpoint_raw/local
  prefer_position_target_raw: true

  # true: 即使当前状态无效也允许发布（不建议）
  allow_publish_without_state: false

