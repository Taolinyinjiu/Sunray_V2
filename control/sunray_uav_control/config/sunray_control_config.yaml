# -------------------基本参数-----------------------
# 无人机名称
uav_name: uav
# 无人机序号
uav_id: 1
# -------------------请注意，以下参数均加载到uav_name+uav_id命名空间下-----------------------
# 无人机质量
mass_kg: 0.96
# 重力加速度
gravity: 0.98
# 控制器类型 0:px4_position_controller 1:px4_velocity_controller 2:sunray_attitude_controller 3:rl_raptor_controller
controller_types: 0
# 控制器更新频率(Hz)
controller_update_frequency: 100
# 订阅的里程计话题名称,请注意，该话题名称并不会在订阅过程中再添加任何的前缀或者修改，也就是说，在这里填写的话题名称应该和使用rostopic list查看的一致
odom_topic_name: "/uav1/sunray_odom_in"
# 是否将里程计与px4进行融合
fuse_odom_to_px4: true
# 里程计融合类型 0：vision_pose 1:odometry 建议在当前里程计没有协方差时选择vision_pose
fust_odom_type: 0
# 融合的频率(建议设定在30-50Hz之间，如果链路富裕可以提高到80-100)
fuse_odom_frequency: 50
# -------------------保护参数-----------------------
# 最低电压
low_voltage: 13.2 # 4S battery
# 达到最低电压时执行的操作 0:无操作 1:降落 2：返回
low_voltage_operate: 0
# 是否允许在无遥控器连接时启动无人机
control_with_no_rc: false 
# 当遥控器状态从连接变成丢失连接时，执行什么操作 0:无操作 1:降落 2:返回
lost_with_rc: 1
# 是否允许代码解锁无人机
arm_with_code: true
# 是否允许代码起飞
takeoff_with_code: true
# 是否进行倾倒检测：当无人机姿态发生大幅度反转时上锁无人机
check_flip: false
# 最大倾斜角度(角度制)
tilt_angle_max: 20
# -------------------起飞降落参数-----------------------
# 相对当前位置的起飞高度(米)
takeoff_relative_height: 0.6
# 起飞过程中的最大速度(m/s)
takeoff_max_velocity: 0.5
# 指定降落模式 0：px4.auto_land 1:code to land
land_type: 1
# 降落过程中的最大速度
land_max_velocity: 0.5
# -------------------电子围栏参数-----------------------
# 使用ROS标准右手系，X正方向超机头前方，Y正方向朝机头左侧，Z轴朝上
electronic_fence:
  x_max: 4.0
  x_min: -4.0
  y_max: 4.0
  y_min: -4.0
  z_max: 2.0
  z_min: 0.0 #如果你的使用场景中，起飞点并不是最低点，可以考虑酌情修改
# -------------------消息超时参数-----------------------
msg_timeout:
  # 里程计
  odom: 0.5
  # 遥控器
  rc: 0.5
  # 对于向Sunray_FSM发送控制命令的各部分，都需要有心跳包的连接
  control_heartbeat: 0.5
  imu: 0.5
  battery: 0.5
# -------------------位置误差容许参数-----------------------
error_tolerance:
  pos_x: 0.05
  pos_y: 0.05
  pos_z: 0.05
# -------------------飞行速度参数-----------------------
# 最大飞行速度(m/s)
max_velocity:
  x_vel: 3.0
  y_vel: 3.0
  z_vel: 1.0
# 遥控器控制时的最大速度
max_velocity_with_rc:
  x_vel: 1.0
  y_vel: 1.0
  z_vel: 1.0


# -------------------控制器参数-----------------------
# -----------px4_position_controller----------------

# 该控制器基于px4完整的控制环，因此参数主要由px4中的控制环参数决定
# 对该控制器的参数整定，使用QGC的在线优化以及PID Tuning界面观察曲线调整参数

# -----------px4_velocity_controller----------------
#  该控制器基于px4速度环，对于位置的控制基于PID控制理论，PID的输出作为速度环的输入，因此需要调节PID参数
# MPC前缀并不表示模型预测控制理论，而是 多选翼控制器
px4_velocity_controller_gains:
  position:
    MPC_XY_P: 1.0 
    MPC_XY_I: 0.0
    MPC_XY_D: 0.0
    MPC_Z_P: 1.0 
    MPC_Z_I: 0.0
    MPC_Z_D: 0.0
  settings:
    # 积分分离阈值，当位置偏差过大时，停止积分防止大幅度的超调
    anti_windup_threshold: 2.0

# ----------sunray_attitude_controller---------------
sunray_attitude_controller:
  hover_percent: 0.37
  pxy_int_max: 10.0
  pz_int_max: 10.0
  Kp_xy: 3.0
  Kp_z: 3.0
  Kv_xy: 3.0
  Kv_z: 3.0
  Kvi_xy: 0.3
  Kvi_z: 0.3

# ----------rl_raptor_controller---------------
# 基本的思路是修改px4代码，uorb消息 -> mavlink -> mavros消息 <- sunray_control
