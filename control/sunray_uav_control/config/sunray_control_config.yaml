# -------------------本文件中所设置的参数，在uav_control_fsm中使用yaml-cpp库进行读取，launch文件仅传递config.yaml路径----------------------

# -------------------基本参数-----------------------
basic_param:
    # 无人机质量
    mass_kg: 0.96
    # 重力加速度
    gravity: 9.8
    # 控制器类型 0:px4_position_controller 1:sunray_attitude_controller 2:rl_raptor_controller
    controller_types: 2
    # 控制器更新频率(Hz)
    controller_update_frequency: 100
    # 状态机低频监督循环频率(Hz)
    supervisor_update_frequency: 10
    # 订阅的里程计话题名称,使用${uav_ns}表示当前uav标识符uav1之类的
    odom_topic_name: "${uav_ns}/sunray/localization/local_odom"
    # 里程计融合类型 0: disable 1：vision_pose 2:odometry 建议在当前里程计没有协方差时选择vision_pose
    fuse_odom_type: 1
    # 里程计融合的频率(需要根据外部里程计的更新频率决定，融合频率应当低于或者等于外部里程计更新频率)
    fuse_odom_frequency: 50
    # 轨迹参考类型 0:flat_output(微分平坦轨迹) 1:se3(全位姿轨迹)
    trajectory_type: 0

# -------------------保护参数-----------------------
protct_param:
    # 最低电压
    low_voltage: 13.2 # 4S battery
    # 达到最低电压时执行的操作 0:无操作 1:立即降落 2：返航并降落
    low_voltage_operate: 0
    # 是否允许在无遥控器连接时启动无人机
    control_with_no_rc: false
    # 当遥控器状态从连接变成丢失连接时，执行什么操作 0:无操作 1:降落 2:返回
    lost_with_rc: 1
    # 是否允许代码解锁无人机
    arm_with_code: true
    # 是否允许代码起飞
    takeoff_with_code: true
    # 是否进行倾倒检测：当无人机姿态发生大幅度反转时上锁无人机
    check_flip: false
    # 最大倾斜角度(角度制)
    tilt_angle_max: 20
    # 当msg超时执行的操作，请注意，由于mavros超时必然导致setpoint无法得到有效的执行，也就是说mavros连接丢失，则无人机控制回到px4自身而非sunray控制节点，因此此处并不包含mavros的丢失
    # 0:无操作 1:立即降落 2：返航并降落
    msg_timeout_operate: 1

# -------------------消息超时参数-----------------------
# 此处均指正常工作，也就是持续有数据后丢失或者数据超时
msg_timeout_param: # 单位为秒(s)
    # 里程计
    local_odometry: 0.5
    # mavros链路(由于所有与px4有关的数据都是从mavros链路拿到的，因此这里直接判断链路稳定性)
    mavros_connect: 0.5
    # TODO：地面站链路(不工作则不会考虑)
    sunray_station: 0.5

# -------------------起飞降落参数-----------------------
takeoff_land_param:
    # 相对当前位置的起飞高度(米)
    takeoff_relative_height: 0.6
    # 起飞过程中的最大速度(m/s)
    takeoff_max_velocity: 0.5
    # 指定降落模式 0：sunray land 1:px4.auto_land
    land_type: 0
    # 降落过程中的最大速度
    land_max_velocity: 0.5

# -------------------运动误差与超时参数-----------------------
# 这里提到的运动超时参数可以这样来理解
# 当我们设置了一个点(x = 1,y = 1,z = 1)时，无人机会朝着目标飞去，但是未必能够精准的在(1,1,1)处悬停
# 他可能在(1.1,1.2,1.1)这样的周围平衡点悬停
# 运动超时参数描述的是，当误差大于本文件规定的运动误差参数，但是小于两倍的运动误差参数的时候
# 保持在稳定点悬停多长时间，认为运动结束
# takeoff和move_point表示的是运动的类型
# timeout
mission_error_param:
    takeoff: #takeoff表示运动类型
        timeout_s: 5.0 # timeout_s表示运动超时参数
        judge_stabile_time_s: 0.5 # judge_stabile_time_s 表示进入到运动误差死区时，判断达到稳定的时间
        pos_stabile_err_m: 0.15 # 表示稳定状态下位置的误差范数
        vel_stabile_err_mps: 0.15 # 表示稳定状态下速度的误差范数

    move_point: #move_point表示运动类型
        timeout_s: 5.0 # timeout_s表示运动超时参数
        judge_stabile_time_s: 0.5 # judge_stabile_time_s 表示进入到运动误差死区时，判断达到稳定的时间
        pos_stabile_err_m: 0.15 # 表示稳定状态下位置的误差范数
        vel_stabile_err_mps: 0.15 # 表示稳定状态下速度的误差范数

# -------------------电子围栏参数-----------------------
# local系参数，针对local里程计，使用ROS标准右手系，X正方向超机头前方，Y正方向朝机头左侧，Z轴朝上
local_fence_param:
    x_max: 4.0
    x_min: -4.0
    y_max: 4.0
    y_min: -4.0
    z_max: 2.0
    z_min: 0.0 #如果你的使用场景中，起飞点并不是最低点，可以考虑酌情修改
# TODO：添加经纬高地理围栏参数

# -------------------飞行速度参数-----------------------
velocity_param:
    # 最大飞行速度(m/s)
    max_velocity:
        x_vel: 3.0
        y_vel: 3.0
        z_vel: 1.0
    # 遥控器控制时的最大速度
    max_velocity_with_rc:
        x_vel: 1.0
        y_vel: 1.0
        z_vel: 1.0
    # 在进行yaw(偏航)角的调整时最大的速度(角度/秒)(deg/s)
    yaw_rate: 30

# -------------------高频控制源仲裁参数-----------------------
# 高频topic控制统一通过 envelope meta 进入状态机仲裁
# 低频service命令(起飞/降落/返航/单次位置控制)会直接打断当前高频控制源
command_sources:
    default:
        priority: 0
        timeout: 0.5
    api:
        priority: 20
        timeout: 0.5
    planner:
        priority: 40
        timeout: 0.5
    mission:
        priority: 50
        timeout: 0.5
    rc:
        priority: 100
        timeout: 0.2
    safety:
        priority: 255
        timeout: 0.1
