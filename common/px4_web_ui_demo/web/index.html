<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PX4 Param Web UI Demo</title>
  <style>
    :root {
      --bg1: #f7f4ec;
      --bg2: #e7f0ea;
      --panel: #ffffff;
      --text: #1c2a24;
      --sub: #4c5f56;
      --line: #d7e1db;
      --ok: #1f8f58;
      --bad: #b03a2e;
      --accent: #16697a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Noto Sans", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 15% 20%, var(--bg2), var(--bg1));
    }
    .wrap {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 22px rgba(22, 105, 122, 0.08);
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    .sub { color: var(--sub); margin-bottom: 8px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    label { font-size: 13px; color: var(--sub); }
    input, select, button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      background: #fff;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 9px 6px;
    }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .mono { font-family: "JetBrains Mono", "Fira Code", monospace; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>PX4 Parameter Dashboard Demo</h1>
      <div class="sub">API base: <span id="apiBase" class="mono"></span></div>
      <div class="sub">Auto refresh interval: 1s</div>
      <div id="status" class="sub">Loading...</div>
    </div>

    <div class="card">
      <div class="row">
        <label>Set Param</label>
        <input id="setName" placeholder="EKF2_EV_CTRL" value="EKF2_EV_CTRL" />
        <select id="setType">
          <option value="int">int</option>
          <option value="float">float</option>
        </select>
        <input id="setValue" placeholder="9" value="9" />
        <button id="setBtn">Apply</button>
      </div>
      <div id="setResult" class="sub"></div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Param Name</th>
            <th>Integer</th>
            <th>Float</th>
            <th>Last Update</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const API_BASE = "__API_BASE_URL__";
    const PARAMS = [
      "EKF2_HGT_REF",
      "EKF2_EV_CTRL",
      "EKF2_EV_DELAY",
      "EKF2_MAG_TYPE",
      "EKF2_MAG_CHECK",
      "EKF2_GPS_CTRL",
      "EKF2_GPS_CHECK",
      "EKF2_GPS_DELAY"
    ];

    const tbody = document.getElementById("tbody");
    const statusEl = document.getElementById("status");
    const setResult = document.getElementById("setResult");
    document.getElementById("apiBase").textContent = API_BASE;

    function nowString() {
      return new Date().toLocaleTimeString();
    }

    async function fetchOne(name) {
      const resp = await fetch(`${API_BASE}/param?name=${encodeURIComponent(name)}`);
      const json = await resp.json();
      if (!json.ok) {
        throw new Error(json.error || "unknown error");
      }
      return json.data;
    }

    async function refresh() {
      const rows = [];
      let okCount = 0;
      for (const p of PARAMS) {
        try {
          const v = await fetchOne(p);
          rows.push(
            `<tr>
              <td class="mono">${p}</td>
              <td>${v.integer}</td>
              <td>${v.real.toFixed(4)}</td>
              <td>${nowString()}</td>
            </tr>`
          );
          okCount += 1;
        } catch (e) {
          rows.push(
            `<tr>
              <td class="mono">${p}</td>
              <td colspan="3" class="bad">${String(e.message || e)}</td>
            </tr>`
          );
        }
      }
      tbody.innerHTML = rows.join("");
      statusEl.innerHTML = `<span class="${okCount === PARAMS.length ? "ok" : "bad"}">Refreshed ${okCount}/${PARAMS.length}</span> @ ${nowString()}`;
    }

    async function setParam() {
      const name = document.getElementById("setName").value.trim();
      const type = document.getElementById("setType").value;
      const raw = document.getElementById("setValue").value.trim();
      const value = type === "int" ? parseInt(raw, 10) : parseFloat(raw);
      if (!name || Number.isNaN(value)) {
        setResult.innerHTML = `<span class="bad">invalid input</span>`;
        return;
      }
      setResult.textContent = "Applying...";
      try {
        const resp = await fetch(`${API_BASE}/param`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, type, value })
        });
        const json = await resp.json();
        if (!json.ok) {
          throw new Error(json.error || "set failed");
        }
        setResult.innerHTML = `<span class="ok">Updated ${name} ok</span>`;
        refresh();
      } catch (e) {
        setResult.innerHTML = `<span class="bad">${String(e.message || e)}</span>`;
      }
    }

    document.getElementById("setBtn").addEventListener("click", setParam);
    refresh();
    setInterval(refresh, 1000);
  </script>
</body>
</html>
